<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies - StreamFlix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">StreamFlix</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="series.html">Series</a>
      <a href="profile.html">Profile</a>
    </div>

    <div class="nav-right">
      <div class="search-box">
        <input id="searchInput" onkeyup="searchMovies()" type="text" placeholder="Search movies...">
      </div>
    </div>
  </div>

  <div class="section" style="margin-top:80px;">
    <h2>🎬 Movies Collection</h2>

    <div class="row" style="flex-wrap:wrap; overflow:hidden;">
      <div class="card" data-name="Avengers" onclick="openDetails('Avengers Endgame','https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?auto=format&fit=crop&w=500&q=80')">
        <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?auto=format&fit=crop&w=500&q=80">
      </div>

      <div class="card" data-name="Batman" onclick="openDetails('Batman Dark Knight','https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=500&q=80')">
        <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=500&q=80">
      </div>

      <div class="card" data-name="Cinema" onclick="openDetails('Cinema Premium','https://images.unsplash.com/photo-1505686994434-e3cc5abf1330?auto=format&fit=crop&w=500&q=80')">
        <img src="https://images.unsplash.com/photo-1505686994434-e3cc5abf1330?auto=format&fit=crop&w=500&q=80">
      </div>

      <div class="card" data-name="Drama Movie" onclick="openDetails('Drama Movie','https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=500&q=80')">
        <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=500&q=80">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
