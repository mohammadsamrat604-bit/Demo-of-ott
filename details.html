<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details - StreamFlix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadDetails()">

  <div class="navbar">
    <div class="logo">StreamFlix</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="series.html">Series</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="details">
    <img id="movieImg" src="">

    <div class="details-info">
      <h1 id="movieTitle">Movie Title</h1>

      <div class="genre">
        <span>Action</span>
        <span>Adventure</span>
        <span>Drama</span>
        <span>4K UHD</span>
      </div>

      <p>
        This is a premium OTT platform movie description page. 
        Watch high quality streaming with modern UI design.
      </p>

      <div class="hero-buttons">
        <button class="btn btn-play" onclick="watchNow()">▶ Watch Now</button>
        <button class="btn btn-info">+ Add to Watchlist</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
